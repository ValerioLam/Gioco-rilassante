<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Il Salto dei Libri</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFDEE9">
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(0deg, #fbc2eb 0%, #a6c1ee 100%); touch-action: manipulation; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Tocca per saltare i libri!</div>
    <canvas id="gameCanvas"></canvas>
    
    <audio id="bgMusic" src="musica.mp3" loop></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bgMusic');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Caricamento immagine faccia
        const faceImg = new Image();
        faceImg.src = 'faccia.png'; // Carica il file anche se ha lo sfondo bianco

        let gameSpeed = 4;
        const gravity = 0.6;
        let isPlaying = false;

        const girl = {
            x: 50, y: canvas.height - 120,
            w: 80, h: 80, // Leggermente più grande per il cerchio
            dy: 0,
            jumpForce: -14, grounded: false,
            draw() {
                if (faceImg.complete) {
                    ctx.save(); // Salva lo stato attuale del canvas

                    // --- CREAZIONE DELLA MASCHERA CIRCOLARE ---
                    ctx.beginPath();
                    // Definisce un cerchio al centro della posizione della bambina
                    ctx.arc(this.x + this.w / 2, this.y + this.h / 2, this.w / 2, 0, Math.PI * 2, true);
                    ctx.closePath();
                    
                    ctx.clip(); // Dice al canvas di disegnare SOLO dentro il cerchio appena definito

                    // Disegna l'immagine quadrata: verrà "ritagliata" dal cerchio
                    ctx.drawImage(faceImg, this.x, this.y, this.w, this.h);

                    ctx.restore(); // Ripristina il canvas per disegnare il resto normalmente

                    // Opzionale: aggiunge un bordino bianco attorno al cerchio per estetica
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x + this.w / 2, this.y + this.h / 2, this.w / 2, 0, Math.PI * 2, true);
                    ctx.stroke();

                } else {
                    ctx.font = '50px serif'; ctx.fillText('👧', this.x, this.y + 50);
                }
            }
        };

        const obstacles = [];
        function playLoseSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.5);
            gain.gain.fadeOutAtTime = 0.5;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            girl.dy += gravity;
            girl.y += girl.dy;

            if (girl.y + girl.h > canvas.height - 30) {
                girl.y = canvas.height - 30 - girl.h;
                girl.dy = 0; girl.grounded = true;
            }
            girl.draw();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= gameSpeed;
                ctx.font = '40px serif';
                ctx.fillText('📚', o.x, o.y);

                // Collisione semplificata (quadrata)
                if (girl.x < o.x + 30 && girl.x + 60 > o.x && girl.y + 70 > o.y - 30) {
                    playLoseSound();
                    obstacles.length = 0;
                }
                if (o.x < -50) obstacles.splice(i, 1);
            }
            requestAnimationFrame(update);
        }

        function start() {
            if(!isPlaying) {
                bgMusic.play();
                isPlaying = true;
            }
            if (girl.grounded) {
                girl.dy = girl.jumpForce;
                girl.grounded = false;
            }
        }

        window.addEventListener('touchstart', start);
        window.addEventListener('mousedown', start);

        setInterval(() => {
            obstacles.push({ x: canvas.width, y: canvas.height - 40 });
        }, 1800);

        update();
    </script>
</body>
</html>
